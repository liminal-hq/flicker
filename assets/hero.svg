<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Flicker — the space between frames. A pluggable homelab ops console for the terminal.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17141f"/>
      <stop offset="1" stop-color="#0f0d15"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb454" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffb454" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- one film frame cell, reused along the strip -->
    <g id="cell">
      <rect x="0" y="0" width="72" height="52" rx="4" fill="#1e1a28" stroke="#3a3346" stroke-width="1.5"/>
    </g>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- projector beam sweeping from the left -->
  <polygon points="0,118 620,60 620,240 0,182" fill="url(#beam)">
    <animate attributeName="opacity" values="0.65;1;0.72;0.95;0.65" dur="3.4s" repeatCount="indefinite"/>
  </polygon>

  <!-- film strip, scrolling forever -->
  <g transform="translate(0,178)">
    <rect x="-20" y="-14" width="1240" height="96" fill="#141019" opacity="0.92"/>
    <g>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-192 0" dur="5s" repeatCount="indefinite"/>
      <!-- sprocket holes -->
      <g fill="#3a3346">
        <g id="sprockets">
          <rect x="8"  y="-8" width="10" height="7" rx="2"/><rect x="56"  y="-8" width="10" height="7" rx="2"/>
          <rect x="104" y="-8" width="10" height="7" rx="2"/><rect x="152" y="-8" width="10" height="7" rx="2"/>
          <rect x="8"  y="69" width="10" height="7" rx="2"/><rect x="56"  y="69" width="10" height="7" rx="2"/>
          <rect x="104" y="69" width="10" height="7" rx="2"/><rect x="152" y="69" width="10" height="7" rx="2"/>
        </g>
        <use href="#sprockets" x="192"/><use href="#sprockets" x="384"/><use href="#sprockets" x="576"/>
        <use href="#sprockets" x="768"/><use href="#sprockets" x="960"/><use href="#sprockets" x="1152"/><use href="#sprockets" x="1344"/>
      </g>
      <!-- frames: play / gauges / sparkline / jax, repeating -->
      <g id="reel">
        <use href="#cell" x="12" y="8"/>
        <path d="M38 22 l22 12 -22 12 z" fill="#98d279"/>
        <use href="#cell" x="108" y="8"/>
        <g>
          <rect x="118" y="20" width="38" height="6" rx="3" fill="#98d279"/>
          <rect x="118" y="31" width="52" height="6" rx="3" fill="#f0c864"/>
          <rect x="118" y="42" width="26" height="6" rx="3" fill="#e25d75"/>
        </g>
      </g>
      <g id="reel2" transform="translate(192,0)">
        <use href="#cell" x="12" y="8"/>
        <polyline points="20,48 30,40 38,44 48,30 58,34 68,22 76,26" fill="none" stroke="#6ecddc" stroke-width="2.5" stroke-linecap="round"/>
        <use href="#cell" x="108" y="8"/>
        <!-- tiny jax -->
        <g fill="none" stroke="#ffb454" stroke-width="2" stroke-linecap="round">
          <rect x="128" y="18" width="30" height="22" rx="7"/>
        </g>
        <circle cx="138" cy="28" r="2.4" fill="#ffffff"/>
        <circle cx="148" cy="28" r="2.4" fill="#ffffff"/>
        <path d="M138 34 q5 4 10 0" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <use href="#reel" x="384"/><use href="#reel2" x="384"/>
      <use href="#reel" x="768"/><use href="#reel2" x="768"/>
      <use href="#reel" x="1152"/><use href="#reel2" x="1152"/>
    </g>
  </g>

  <!-- title, flickering the way a projector lamp does -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, monospace">
    <text x="72" y="102" font-size="64" font-weight="700" letter-spacing="14" fill="#ffb454" filter="url(#glow)">FLICKER
      <animate attributeName="opacity" values="1;0.82;1;1;0.9;1;0.75;1" dur="2.8s" repeatCount="indefinite"/>
    </text>
    <text x="76" y="136" font-size="19" fill="#a89bb0" letter-spacing="2">the space between frames · a pluggable homelab ops console</text>
    <g font-size="14" letter-spacing="1">
      <text x="76" y="163" fill="#6ecddc">ratatui</text>
      <text x="150" y="163" fill="#3a3346">▪</text>
      <text x="168" y="163" fill="#98d279">fully async</text>
      <text x="272" y="163" fill="#3a3346">▪</text>
      <text x="290" y="163" fill="#f0c864">10 plugins</text>
      <text x="386" y="163" fill="#3a3346">▪</text>
      <text x="404" y="163" fill="#e25d75">jax 2.0 inside</text>
    </g>
  </g>

  <!-- the between-frame: a slice of darkness your eye never sees -->
  <rect x="836" y="0" width="3" height="300" fill="#000000" opacity="0.55">
    <animate attributeName="x" values="836;838;835;837;836" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- big Jax, on shift, blinking -->
  <g transform="translate(980,52)" font-family="ui-monospace, Menlo, monospace">
    <rect x="-24" y="-26" width="196" height="118" rx="12" fill="#1e1a28" stroke="#e25d75" stroke-width="1.5" opacity="0.95"/>
    <text x="-10" y="-6" font-size="13" fill="#e25d75" letter-spacing="1">jax 2.0 · on shift</text>
    <g fill="#ffb454" font-size="20" font-weight="600">
      <text x="6" y="26">.---.</text>
      <text x="6" y="70">'--'</text>
    </g>
    <g font-size="20" font-weight="600" fill="#ffffff">
      <text x="-4" y="48">|</text>
      <text x="62" y="48">|</text>
      <g>
        <text x="8" y="48">●‿●
          <animate attributeName="opacity" values="1;1;1;1;0;1" keyTimes="0;0.2;0.5;0.86;0.9;1" dur="3.2s" repeatCount="indefinite"/>
        </text>
        <text x="8" y="48" opacity="0">-‿-
          <animate attributeName="opacity" values="0;0;0;0;1;0" keyTimes="0;0.2;0.5;0.86;0.9;1" dur="3.2s" repeatCount="indefinite"/>
        </text>
      </g>
    </g>
    <!-- his little reel -->
    <g transform="translate(120,40)">
      <circle r="17" fill="none" stroke="#6ecddc" stroke-width="3"/>
      <g stroke="#6ecddc" stroke-width="2.4" stroke-linecap="round">
        <line x1="0" y1="-12" x2="0" y2="12"/>
        <line x1="-12" y1="0" x2="12" y2="0"/>
      </g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite" additive="sum"/>
    </g>
  </g>
</svg>
